services:
  postgres:
    image: postgres:16-alpine
    container_name: invoicedesk_pg
    environment:
      POSTGRES_DB: invoicedesk
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d invoicedesk"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: invoicedesk_redis
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  ipfs:
    image: ipfs/kubo:latest
    container_name: invoicedesk_ipfs
    ports:
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfsdata:/data/ipfs
volumes:
  pgdata:
  ipfsdata:

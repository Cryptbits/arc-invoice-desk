specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: InvoiceRegistry
    network: arc-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: InvoiceRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Invoice
        - InvoiceSettled
      abis:
        - name: InvoiceRegistry
          file: ./abis/InvoiceRegistry.json
      eventHandlers:
        - event: InvoiceMinted(indexed uint256,indexed address,uint256,uint256)
          handler: handleInvoiceMinted
        - event: InvoiceEscrowed(indexed uint256,indexed address)
          handler: handleInvoiceEscrowed
        - event: InvoiceSettled(indexed uint256,uint256)
          handler: handleInvoiceSettled
        - event: InvoiceDefaulted(indexed uint256)
          handler: handleInvoiceDefaulted
      file: ./src/invoice-registry.ts
  - kind: ethereum
    name: LendingPool
    network: arc-testnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: LendingPool
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Bid
        - Deposit
        - AuctionCleared
      abis:
        - name: LendingPool
          file: ./abis/LendingPool.json
      eventHandlers:
        - event: Deposited(indexed address,uint256)
          handler: handleDeposited
        - event: BidPlaced(indexed uint256,indexed address,uint256,uint256)
          handler: handleBidPlaced
        - event: AuctionCleared(indexed uint256,uint256,uint256)
          handler: handleAuctionCleared
        - event: RepaymentClaimed(indexed address,uint256,uint256)
          handler: handleRepaymentClaimed
      file: ./src/lending-pool.ts
